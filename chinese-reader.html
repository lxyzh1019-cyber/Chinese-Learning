<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读故事 · 姐妹花</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --night: #0d0f1e;
  --deep: #141728;
  --panel: #1a1f38;
  --panel2: #1f2542;
  --red: #e84040;
  --gold: #f5a623;
  --gold-dim: rgba(245,166,35,0.35);
  --jade: #3ecf8e;
  --jade-dim: rgba(62,207,142,0.15);
  --ink: #eef0f8;
  --muted: #8892b0;
  --pink: #ff6b9d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--night);
  color:var(--ink);
  font-family:'Quicksand',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* STARFIELD */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;}

/* LANTERNS DECO */
.ldeco{
  position:fixed;pointer-events:none;z-index:0;
  width:20px;height:28px;
  border-radius:50% 50% 45% 45%;
  animation:floatUp linear infinite;
  opacity:0;
}
.ldeco::after{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:1px;height:8px;background:currentColor;opacity:.4;
}
@keyframes floatUp{
  0%{transform:translateY(105vh) rotate(-6deg);opacity:0;}
  6%{opacity:.5;}
  92%{opacity:.4;}
  100%{transform:translateY(-12vh) rotate(8deg);opacity:0;}
}

/* LAYOUT */
#app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 1rem 6rem;}

/* HEADER */
header{text-align:center;padding:3rem 1rem 1.8rem;position:relative;}
.hglow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:320px;height:220px;
  background:radial-gradient(ellipse,rgba(232,64,64,0.13) 0%,transparent 70%);
  pointer-events:none;
}
.app-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(3rem,9vw,4.5rem);
  background:linear-gradient(140deg,#f5a623 0%,#e84040 48%,#ff6b9d 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(245,166,35,.45));
  letter-spacing:.08em;line-height:1;
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{filter:drop-shadow(0 0 22px rgba(245,166,35,.45));}
  50%{filter:drop-shadow(0 0 40px rgba(245,166,35,.75));}
}
.app-sub{font-size:.8rem;color:var(--muted);margin-top:.6rem;letter-spacing:.13em;text-transform:uppercase;}
.hdiv{margin:1.3rem auto 0;width:130px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}

/* STORY CARDS */
#story-list{padding-top:.4rem;}
.story-card{
  background:var(--panel);
  border:1px solid rgba(245,166,35,.1);
  border-radius:22px;
  padding:1.1rem 1.3rem;
  margin-bottom:.9rem;
  display:flex;align-items:center;gap:1.1rem;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:slideIn .5s both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
.story-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,166,35,.04) 0%,transparent 55%);
  pointer-events:none;
}
.story-card:hover:not(.locked){
  transform:translateY(-3px);
  border-color:rgba(245,166,35,.4);
  box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 22px rgba(245,166,35,.1);
}
.story-card.locked{opacity:.35;cursor:not-allowed;border-color:rgba(255,255,255,.04);}
.story-card.completed{
  border-color:rgba(62,207,142,.3);
  background:linear-gradient(135deg,#1a2535,#1e2b25);
}

/* Lantern icon */
.clan{width:46px;height:64px;flex-shrink:0;position:relative;display:flex;flex-direction:column;align-items:center;}
.clan-top{width:12px;height:7px;background:rgba(255,255,255,.18);border-radius:3px 3px 0 0;}
.clan-body{
  width:36px;height:46px;
  border-radius:50% 50% 46% 46%;
  display:flex;align-items:center;justify-content:center;
  transition:box-shadow .3s;
}
.story-card:hover:not(.locked) .clan-body{filter:brightness(1.2);}
.clan-num{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:rgba(255,255,255,.92);line-height:1;}
.clan-tassel{width:1.5px;height:10px;background:rgba(255,255,255,.35);margin-top:1px;}

.cinfo{flex:1;min-width:0;}
.czh{font-family:'Noto Serif SC',serif;font-size:1.15rem;font-weight:700;color:var(--ink);}
.cen{font-size:.74rem;color:var(--muted);margin-top:.18rem;letter-spacing:.04em;}
.cdots{display:flex;gap:5px;margin-top:.5rem;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .4s;}
.dot.done{background:var(--jade);box-shadow:0 0 6px var(--jade);}
.cstat{font-size:1.5rem;flex-shrink:0;}

/* LIBRARY */
#lib-section{margin-top:.8rem;}
.sec-hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(245,166,35,.3),transparent);}
.sec-line.r{background:linear-gradient(90deg,transparent,rgba(245,166,35,.3));}
.sec-ttl{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--gold);white-space:nowrap;}
.char-grid{display:flex;flex-wrap:wrap;gap:8px;}
.lchar{
  background:var(--panel2);border:1px solid rgba(62,207,142,.2);
  border-radius:12px;padding:.45rem .6rem;text-align:center;min-width:58px;
  cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
}
.lchar:hover{transform:translateY(-2px);border-color:var(--jade);box-shadow:0 4px 14px var(--jade-dim);}
.lpy{font-size:.72rem;color:var(--red);font-weight:700;}
.lhz{font-family:'Noto Serif SC',serif;font-size:1.4rem;color:var(--jade);}
.lmn{font-size:.58rem;color:var(--muted);margin-top:.1rem;}

/* READER */
#reader{display:none;}
.rhdr{display:flex;align-items:center;gap:.8rem;padding:1.5rem 0 1.2rem;}
.back-btn{
  background:var(--panel);border:1px solid var(--gold-dim);
  border-radius:10px;padding:.4rem .9rem;
  font-family:'Quicksand',sans-serif;font-size:.85rem;font-weight:700;
  color:var(--gold);cursor:pointer;transition:background .15s,box-shadow .15s;
}
.back-btn:hover{background:rgba(245,166,35,.1);box-shadow:0 0 14px rgba(245,166,35,.2);}
.rttl{
  font-family:'Ma Shan Zheng',cursive;font-size:1.5rem;
  background:linear-gradient(135deg,var(--gold),var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex:1;
}

/* Progress */
.prog-wrap{margin-bottom:1.8rem;}
.prog-track{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--jade));
  border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1);
}
.prog-lbl{font-size:.72rem;color:var(--muted);margin-top:.4rem;text-align:right;}

/* Sentences */
.sent-block{
  background:var(--panel);
  border:1px solid rgba(255,255,255,.05);
  border-left:3px solid;
  border-radius:18px;padding:1.2rem 1rem 1rem;
  margin-bottom:1rem;
  opacity:0;transform:translateY(12px);
  animation:sentIn .45s forwards;
  position:relative;
}
@keyframes sentIn{to{opacity:1;transform:none;}}
.sent-line{display:flex;flex-wrap:wrap;gap:6px 4px;align-items:flex-end;}

/* Char unit */
.cu{
  display:inline-flex;flex-direction:column;align-items:center;
  cursor:pointer;padding:6px 7px 4px;
  border-radius:12px;border:1.5px solid transparent;
  transition:all .18s;position:relative;
  background:rgba(255,255,255,.03);
}
.cu:hover{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.3);transform:translateY(-3px);}
.cu.tapped{background:rgba(232,64,64,.1);border-color:rgba(232,64,64,.3);}
.cu.known{background:rgba(62,207,142,.07);border-color:rgba(62,207,142,.22);}

.py{
  font-size:1.05rem;color:var(--red);
  font-family:'Quicksand',sans-serif;font-weight:700;
  letter-spacing:.04em;min-height:1.35rem;line-height:1.35;
  opacity:0;transition:opacity .25s;white-space:nowrap;
}
.cu.revealed .py,.cu.known .py{opacity:1;}
.cu.known .py{color:var(--jade);}

.hz{
  font-family:'Noto Serif SC',serif;
  font-size:1.9rem;line-height:1.1;color:var(--ink);
  transition:color .2s,text-shadow .2s;
}
.cu.tapped .hz{color:#ffcba4;text-shadow:0 0 20px rgba(245,166,35,.6);}
.cu.known .hz{color:var(--jade);text-shadow:0 0 14px rgba(62,207,142,.4);}

.tap-ring{
  position:absolute;inset:0;border-radius:12px;
  border:2px solid var(--gold);opacity:0;
}
.cu.just-tapped .tap-ring{animation:ring .4s ease-out forwards;}
@keyframes ring{
  0%{opacity:.8;transform:scale(1);}
  100%{opacity:0;transform:scale(1.65);}
}

.mtip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--gold-dim);
  color:var(--gold);font-size:.68rem;font-weight:700;
  padding:.3rem .6rem;border-radius:8px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .18s;z-index:10;
  box-shadow:0 4px 14px rgba(0,0,0,.45);
}
.mtip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--gold-dim);
}
.cu:hover .mtip,.cu.tapped .mtip{opacity:1;}
.cu.known:hover .mtip{opacity:1;}

.thint{font-size:.54rem;color:var(--muted);margin-top:2px;opacity:0;transition:opacity .2s;}
.cu:not(.known):not(.revealed) .thint{opacity:.65;}

/* Punct */
.punct{
  font-family:'Noto Serif SC',serif;
  font-size:1.9rem;color:rgba(255,255,255,.22);
  line-height:1.1;padding-bottom:4px;align-self:flex-end;
}

/* Unlock */
.unlock-btn{
  display:block;width:100%;margin-top:1.8rem;padding:1rem;
  border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--red),#c02828);
  color:white;font-family:'Quicksand',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 6px 24px rgba(232,64,64,.35);
  transition:transform .15s,box-shadow .15s;
  letter-spacing:.05em;position:relative;overflow:hidden;
}
.unlock-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
}
.unlock-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(232,64,64,.5);}
.unlock-btn:disabled{background:rgba(255,255,255,.07);color:var(--muted);box-shadow:none;cursor:not-allowed;}
.hint-txt{text-align:center;font-size:.78rem;color:var(--muted);margin-top:.7rem;}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;background:rgba(6,7,16,.78);backdrop-filter:blur(9px);z-index:100;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
.ov-card{
  background:linear-gradient(160deg,#1f2542,#141929);
  border:1px solid rgba(245,166,35,.3);border-radius:28px;
  padding:2.8rem 2.2rem;text-align:center;
  max-width:340px;width:92%;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 40px rgba(245,166,35,.1);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.ov-card::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;
  background:radial-gradient(ellipse,rgba(245,166,35,.1) 0%,transparent 70%);
  pointer-events:none;
}
@keyframes popIn{from{transform:scale(.62);opacity:0;}to{transform:scale(1);opacity:1;}}
.ov-emoji{font-size:4rem;margin-bottom:.8rem;display:block;}
.ov-title{
  font-family:'Ma Shan Zheng',cursive;font-size:2.3rem;
  background:linear-gradient(135deg,var(--gold),var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.6rem;
}
.ov-msg{font-size:.88rem;color:var(--muted);line-height:1.75;margin-bottom:1.8rem;white-space:pre-line;}
.ov-btn{
  background:linear-gradient(135deg,var(--gold),#e8961a);
  color:var(--night);border:none;border-radius:14px;
  padding:.85rem 2.5rem;
  font-family:'Quicksand',sans-serif;font-weight:700;font-size:1rem;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(245,166,35,.35);
}
.ov-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,166,35,.5);}

/* CONFETTI */
#ccanvas{position:fixed;inset:0;pointer-events:none;z-index:200;}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="ccanvas"></canvas>
<div id="ldeco-wrap" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;"></div>

<div id="app">
  <header>
    <div class="hglow"></div>
    <div class="app-title">读故事</div>
    <div class="app-sub">姐妹花的中文书 · Stories for Two Sisters</div>
    <div class="hdiv"></div>
  </header>

  <div id="story-list"></div>

  <div id="lib-section" style="display:none">
    <div class="sec-hdr">
      <div class="sec-line"></div>
      <div class="sec-ttl">📚 我们的字库 · Our Library</div>
      <div class="sec-line r"></div>

    <div class="char-grid" id="char-grid"></div>
  </div>

  <div id="reader">
    <div class="rhdr">
      <button class="back-btn" onclick="goHome()">← 返回</button>
      <div class="rttl" id="rttl"></div>

      <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
      <div class="prog-lbl" id="plbl">0%</div>

    <div id="scontent"></div>
    <button class="unlock-btn" id="ubtn" onclick="completeStory()" disabled>
      🌟 故事读完了！· Story Complete!

    <div class="hint-txt" id="htxt">请点开所有生字 · Tap all new characters to unlock</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-card">
    <span class="ov-emoji" id="ovemoji">🎉</span>
    <div class="ov-title" id="ovttl">太棒了！</div>
    <div class="ov-msg" id="ovmsg"></div>
    <button class="ov-btn" onclick="closeComplete()">继续 →</button>
  </div>
</div>

<script>
// ── STARS ─────────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;draw();}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<180;i++){
      const x=Math.random()*c.width,y=Math.random()*c.height;
      const r=Math.random()*1.3+.2,a=Math.random()*.7+.1;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
    }
  }
  window.addEventListener('resize',resize);resize();
})();

// ── FLOATING LANTERNS ─────────────────────────────────────────────────────────
(function(){
  const wrap=document.getElementById('ldeco-wrap');
  const cols=[
    {bg:'rgba(232,64,64,.45)',c:'#e84040'},
    {bg:'rgba(245,166,35,.45)',c:'#f5a623'},
    {bg:'rgba(255,107,157,.38)',c:'#ff6b9d'},
    {bg:'rgba(62,207,142,.35)',c:'#3ecf8e'},
    {bg:'rgba(167,139,250,.35)',c:'#a78bfa'},
  ];
  for(let i=0;i<9;i++){
    const d=document.createElement('div');
    d.className='ldeco';
    const col=cols[i%cols.length];
    d.style.cssText=`left:${8+Math.random()*84}%;background:${col.bg};color:${col.c};box-shadow:0 0 14px ${col.c};animation-duration:${16+Math.random()*22}s;animation-delay:${Math.random()*18}s;`;
    wrap.appendChild(d);
  }
})();

// ── BORDER COLORS PER SENTENCE ───────────────────────────────────────────────
const SENT_BORDERS=['#e84040','#f5a623','#3ecf8e','#ff6b9d','#a78bfa','#60a5fa'];

// ── STATE ─────────────────────────────────────────────────────────────────────
const SK='sisters_zh_v3';
function load(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{completed:[],library:{}};}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
let state=load();
let cur=null,tapped=new Set(),newChars=new Set(),totalNew=0;

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(ch){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(ch);
  u.lang='zh-CN';u.rate=.82;u.pitch=1;
  const vs=window.speechSynthesis.getVoices();
  const zh=vs.find(v=>v.lang.startsWith('zh'));
  if(zh)u.voice=zh;
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('reader').style.display='none';
  document.getElementById('story-list').style.display='block';
  const lk=Object.keys(state.library);
  const ls=document.getElementById('lib-section');
  ls.style.display=lk.length?'block':'none';
  renderLib();

  const list=document.getElementById('story-list');
  list.innerHTML='';
  STORIES.forEach((story,i)=>{
    const done=state.completed.includes(story.id);
    const locked=i>0&&!state.completed.includes(STORIES[i-1].id);
    const col=LCOLORS[i%LCOLORS.length];
    const card=document.createElement('div');
    card.className='story-card'+(locked?' locked':'')+(done?' completed':'');
    card.style.animationDelay=(i*.09)+'s';
    const dots=story.sentences.map((_,di)=>`<div class="dot${done?' done':''}"></div>`).join('');
    card.innerHTML=`
      <div class="clan">
        <div class="clan-top"></div>
        <div class="clan-body" style="background:${col.bg};box-shadow:0 0 20px ${col.glow},inset 0 0 10px rgba(255,255,255,.07)">
          <div class="clan-num">${story.id}</div>
        </div>
        <div class="clan-tassel"></div>
      </div>
      <div class="cinfo">
        <div class="czh">${story.title}</div>
        <div class="cen">${story.titleEn}</div>
        <div class="cdots">${dots}</div>
      </div>
      <div class="cstat">${done?'✅':locked?'🔒':story.emoji}</div>
    `;
    if(!locked)card.onclick=()=>openStory(story);
    list.appendChild(card);
  });
}

// ── OPEN STORY ────────────────────────────────────────────────────────────────
function openStory(story){
  cur=story;tapped=new Set();newChars=new Set();totalNew=0;
  document.getElementById('story-list').style.display='none';
  document.getElementById('lib-section').style.display='none';
  document.getElementById('reader').style.display='block';
  document.getElementById('rttl').textContent=story.title+' · '+story.titleEn;
  document.getElementById('pfill').style.width='0%';
  document.getElementById('plbl').textContent='0%';

  const sc=document.getElementById('scontent');
  sc.innerHTML='';

  story.sentences.forEach((sent,si)=>{
    const block=document.createElement('div');
    block.className='sent-block';
    block.style.cssText=`animation-delay:${si*.08}s;border-left-color:${SENT_BORDERS[si%SENT_BORDERS.length]};`;

    const line=document.createElement('div');
    line.className='sent-line';

    sent.forEach(tok=>{
      if(tok.type==='punct'){
        const s=document.createElement('span');
        s.className='punct';s.textContent=tok.text;
        line.appendChild(s);return;
      }
      if(!tok.pinyin){
        const s=document.createElement('span');
        s.className='punct';s.textContent=tok.char;
        line.appendChild(s);return;
      }
      const known=!!state.library[tok.char];
      if(!known){totalNew++;newChars.add(tok.char);}
      const u=document.createElement('div');
      u.className='cu'+(known?' known revealed':'');
      u.innerHTML=`
        <div class="tap-ring"></div>
        <div class="py">${tok.pinyin}</div>
        <div class="hz">${tok.char}</div>
        <div class="mtip">${tok.meaning||''}</div>
        <div class="thint">🔊</div>
      `;
      u.onclick=()=>tapChar(u,tok);
      line.appendChild(u);
    });

    block.appendChild(line);
    sc.appendChild(block);
  });
  checkUnlock();
}

// ── TAP ───────────────────────────────────────────────────────────────────────
function tapChar(u,tok){
  speak(tok.char);
  u.classList.remove('just-tapped');
  void u.offsetWidth;
  u.classList.add('just-tapped');
  if(u.classList.contains('known'))return;
  u.classList.add('revealed','tapped');
  tapped.add(tok.char);
  updateProg();
  checkUnlock();
}

function updateProg(){
  const n=[...tapped].filter(c=>newChars.has(c)).length;
  const pct=totalNew===0?100:Math.round(n/totalNew*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plbl').textContent=pct+'%';
}

function checkUnlock(){
  const n=[...tapped].filter(c=>newChars.has(c)).length;
  const all=n>=newChars.size;
  document.getElementById('ubtn').disabled=!all;
  const h=document.getElementById('htxt');
  if(all){h.textContent='✨ 所有生字都认识了！All new characters explored!';}
  else{const r=newChars.size-n;h.textContent=`还有 ${r} 个生字 · ${r} character${r>1?'s':''} left to tap`;}
}

// ── COMPLETE ──────────────────────────────────────────────────────────────────
function completeStory(){
  newChars.forEach(ch=>{
    outer:for(const s of STORIES)for(const sent of s.sentences)for(const t of sent)
      if(t.type==='char'&&t.char===ch&&t.pinyin){state.library[ch]={pinyin:t.pinyin,meaning:t.meaning};break outer;}
  });
  if(!state.completed.includes(cur.id))state.completed.push(cur.id);
  save(state);
  const last=cur.id===STORIES.length;
  document.getElementById('ovemoji').textContent=last?'🏆':'⭐';
  document.getElementById('ovttl').textContent=last?'全部读完！':'太棒了！';
  document.getElementById('ovmsg').textContent=last
    ?`五个故事全都读完了！\n字库里现在有 ${Object.keys(state.library).length} 个字！\n\nAll five stories finished!\nYour library has ${Object.keys(state.library).length} characters!`
    :`《${cur.title}》读完了！\n新认识了 ${newChars.size} 个字。\n\n"${cur.titleEn}" complete!\n${newChars.size} new characters added to the library.`;
  document.getElementById('overlay').classList.add('show');
  launchConfetti();
}
function closeComplete(){document.getElementById('overlay').classList.remove('show');goHome();}
function goHome(){
  document.getElementById('reader').style.display='none';
  document.getElementById('story-list').style.display='block';
  renderHome();
}

// ── LIBRARY ───────────────────────────────────────────────────────────────────
function renderLib(){
  const g=document.getElementById('char-grid');g.innerHTML='';
  Object.entries(state.library).forEach(([ch,d])=>{
    const div=document.createElement('div');div.className='lchar';
    div.innerHTML=`<div class="lpy">${d.pinyin}</div><div class="lhz">${ch}</div><div class="lmn">${d.meaning||''}</div>`;
    div.onclick=()=>speak(ch);
    g.appendChild(div);
  });
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function launchConfetti(){
  const c=document.getElementById('ccanvas'),ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const ps=Array.from({length:110},()=>({
    x:Math.random()*c.width,y:Math.random()*-c.height*.6,
    r:Math.random()*7+3,d:Math.random()*3+1.5,
    color:['#e84040','#f5a623','#3ecf8e','#ff6b9d','#fff3a0','#a78bfa','#60a5fa'][Math.floor(Math.random()*7)],
    tilt:Math.random()*20-10,ts:Math.random()*.12-.06,
    shape:Math.random()>.5?'c':'r',
  }));
  let fr=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.tilt);
      ctx.fillStyle=p.color;
      if(p.shape==='c'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.r,-p.r*.5,p.r*2,p.r);}
      ctx.restore();
      p.y+=p.d*2.3;p.x+=Math.sin(fr*.018+p.tilt)*.8;p.tilt+=p.ts;
    });
    fr++;
    if(fr<230)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
